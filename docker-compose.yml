services:
  postgres:
    image: postgres:16-alpine
    container_name: tokenpulse-postgres
    restart: always
    environment:
      - POSTGRES_DB=tokenpulse
      - POSTGRES_USER=tokenpulse
      - POSTGRES_PASSWORD=tokenpulse
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenpulse -d tokenpulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  tokenpulse:
    build: .
    image: tokenpulse:latest
    container_name: tokenpulse
    restart: always
    network_mode: "bridge"
    ports:
      - "9009:3000"
      - "1455:1455" # Codex Callback
      - "11451:11451" # iFlow Callback
      - "8085:8085" # Gemini Callback
      - "54545:54545" # Claude Callback
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://tokenpulse:tokenpulse@postgres:5432/tokenpulse}
      - PORT=3000
      - NODE_ENV=${NODE_ENV:-production}
      - BASE_URL=${BASE_URL:-http://localhost:9009}
      - API_SECRET=${API_SECRET:-default-change-me-in-prod}
      - GEMINI_CLIENT_ID=${GEMINI_CLIENT_ID:-}
      - GEMINI_CLIENT_SECRET=${GEMINI_CLIENT_SECRET:-}
      - ANTIGRAVITY_CLIENT_ID=${ANTIGRAVITY_CLIENT_ID:-}
      - ANTIGRAVITY_CLIENT_SECRET=${ANTIGRAVITY_CLIENT_SECRET:-}
      - CLAUDE_CLIENT_ID=${CLAUDE_CLIENT_ID:-}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET}
      # NOTE: NODE_TLS_REJECT_UNAUTHORIZED is now handled conditionally in src/index.ts

  claude-bridge-go:
    build:
      context: ./services/claude-utls-bridge-go
    image: tokenpulse-claude-bridge-go:latest
    container_name: tokenpulse-claude-bridge-go
    restart: unless-stopped
    profiles: ["bridge-go"]
    ports:
      - "9460:9460"
    environment:
      - PORT=9460
      - CLAUDE_BRIDGE_UPSTREAM=${CLAUDE_BRIDGE_UPSTREAM:-https://api.anthropic.com/v1/messages?beta=true}
      - CLAUDE_BRIDGE_TIMEOUT_MS=${CLAUDE_BRIDGE_TIMEOUT_MS:-30000}
      - CLAUDE_BRIDGE_SHARED_KEY=${CLAUDE_BRIDGE_SHARED_KEY:-}

  prometheus:
    image: prom/prometheus:v2.53.2
    container_name: tokenpulse-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./monitoring/secrets/tokenpulse_api_secret.example:/etc/prometheus/secrets/tokenpulse_api_secret:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - tokenpulse
      - alertmanager

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: tokenpulse-alertmanager
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ${ALERTMANAGER_CONFIG_PATH:-./monitoring/alertmanager.webhook.local.example.yml}:/etc/alertmanager/alertmanager.yml:ro
      - ${ALERTMANAGER_TEMPLATES_PATH:-./monitoring/alertmanager-templates}:/etc/alertmanager/alertmanager-templates:ro
      - alertmanager_data:/alertmanager
    extra_hosts:
      - "host.docker.internal:host-gateway"


volumes:
  pg_data:
  prometheus_data:
  alertmanager_data:
