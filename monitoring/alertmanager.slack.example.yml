global:
  resolve_timeout: 5m

templates:
  - /etc/alertmanager/alertmanager-templates/*.tmpl

route:
  receiver: "slack-warning"
  group_by: ["alertname", "service", "severity", "provider"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: "slack-warning"
      matchers:
        - severity="warning"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      continue: false
    - receiver: "slack-critical"
      matchers:
        - severity="critical"
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m
      continue: false

receivers:
  - name: "slack-warning"
    slack_configs:
      - api_url: "https://example.invalid/slack/webhook-warning"
        channel: "#oncall-warning"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'

  - name: "slack-critical"
    slack_configs:
      - api_url: "https://example.invalid/slack/webhook-critical"
        channel: "#oncall-critical"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
