global:
  resolve_timeout: 5m

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: "warning-webhook"
  group_by: ["alertname", "service", "severity", "provider"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: "p1-webhook"
      matchers:
        - severity="critical"
        - escalation="p1-15m"
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 15m
      continue: false
    - receiver: "warning-webhook"
      matchers:
        - severity="warning"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      continue: false
    - receiver: "critical-webhook"
      matchers:
        - severity="critical"
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m
      continue: false

receivers:
  - name: "warning-webhook"
    webhook_configs:
      - url: "https://example.invalid/webhooks/tokenpulse-warning"
        send_resolved: true

  - name: "critical-webhook"
    webhook_configs:
      - url: "https://example.invalid/webhooks/tokenpulse-critical"
        send_resolved: true

  - name: "p1-webhook"
    webhook_configs:
      - url: "https://example.invalid/webhooks/tokenpulse-p1"
        send_resolved: true
