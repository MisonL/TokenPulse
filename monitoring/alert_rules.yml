groups:
  - name: "tokenpulse-oauth-alerts"
    rules:
      - alert: "TokenPulseOAuthCritical5m"
        expr: |
          sum by (provider) (
            rate(tokenpulse_oauth_alert_events_total{result="created", severity="critical"}[5m])
          ) > 0
        for: "5m"
        labels:
          severity: "critical"
          service: "tokenpulse"
          category: "oauth"
          escalation: "critical-5m"
        annotations:
          summary: "TokenPulse OAuth critical 告警（5 分钟）"
          description: "provider={{ $labels.provider }} 在 5 分钟窗口内持续出现 critical 告警。"

      - alert: "TokenPulseOAuthCriticalSustained15m"
        expr: |
          sum by (provider) (
            rate(tokenpulse_oauth_alert_events_total{result="created", severity="critical"}[5m])
          ) > 0
        for: "15m"
        labels:
          severity: "critical"
          service: "tokenpulse"
          category: "oauth"
          escalation: "p1-15m"
        annotations:
          summary: "TokenPulse OAuth critical 持续 15 分钟（升级 P1）"
          description: "provider={{ $labels.provider }} 的 critical 告警持续 15 分钟，需升级到 P1。"

      - alert: "TokenPulseOAuthDeliveryFailureBurst"
        expr: |
          sum by (provider, channel) (
            rate(tokenpulse_oauth_alert_delivery_total{status="failure", reason!~"muted_provider|below_min_severity|quiet_hours_suppressed"}[5m])
          ) > 0.2
        for: "5m"
        labels:
          severity: "warning"
          service: "tokenpulse"
          category: "oauth"
          escalation: "delivery-warning"
        annotations:
          summary: "TokenPulse OAuth 告警投递失败突增"
          description: "provider={{ $labels.provider }} channel={{ $labels.channel }} 在 5 分钟内投递失败率偏高。"

      - alert: "TokenPulseAlertmanagerSyncFailures"
        expr: |
          increase(tokenpulse_alertmanager_control_operations_total{operation="sync", outcome=~"sync_error|internal_error|conflict"}[5m]) > 0
        for: "5m"
        labels:
          severity: "warning"
          service: "tokenpulse"
          category: "oauth"
          escalation: "alertmanager-sync-warning"
        annotations:
          summary: "TokenPulse Alertmanager 同步失败"
          description: "Alertmanager 控制面在 5 分钟窗口内出现 sync_error/internal_error/conflict，请复核 sync-history 与 traceId。"

      - alert: "TokenPulseAlertmanagerRollbackFailures"
        expr: |
          increase(tokenpulse_alertmanager_control_operations_total{operation="rollback", outcome=~"sync_error|internal_error|conflict"}[5m]) > 0
        for: "5m"
        labels:
          severity: "warning"
          service: "tokenpulse"
          category: "oauth"
          escalation: "alertmanager-rollback-warning"
        annotations:
          summary: "TokenPulse Alertmanager 回滚失败"
          description: "Alertmanager 控制面在 5 分钟窗口内出现 rollback sync_error/internal_error/conflict，请立即复核回滚结果。"

      - alert: "TokenPulseAlertmanagerSyncStale"
        expr: |
          time() - max by (operation) (
            tokenpulse_alertmanager_control_last_success_timestamp_seconds{operation="sync"}
          ) > 86400
        for: "15m"
        labels:
          severity: "warning"
          service: "tokenpulse"
          category: "oauth"
          escalation: "alertmanager-sync-stale"
        annotations:
          summary: "TokenPulse Alertmanager 超过 24 小时未成功同步"
          description: "Alertmanager 控制面最近 24 小时没有成功 sync，请确认是否存在未发布配置或同步链路异常。"

  - name: "tokenpulse-agentledger-runtime"
    rules:
      - alert: "TokenPulseAgentLedgerDeliveryNotConfigured"
        expr: |
          tokenpulse_agentledger_runtime_worker_config_state{state="enabled"} == 1
            and
          tokenpulse_agentledger_runtime_worker_config_state{state="delivery_configured"} == 0
        for: "5m"
        labels:
          severity: "warning"
          service: "tokenpulse"
          category: "agentledger"
          escalation: "delivery-not-configured"
        annotations:
          summary: "TokenPulse AgentLedger 投递配置缺失"
          description: "AgentLedger worker 已启用，但 ingest URL 或签名密钥未配置，运行时摘要事件不会被发送。"

      - alert: "TokenPulseAgentLedgerWorkerStale"
        expr: |
          tokenpulse_agentledger_runtime_worker_config_state{state="enabled"} == 1
            and
          time() - tokenpulse_agentledger_runtime_last_cycle_timestamp_seconds > 300
        for: "5m"
        labels:
          severity: "warning"
          service: "tokenpulse"
          category: "agentledger"
          escalation: "worker-stale"
        annotations:
          summary: "TokenPulse AgentLedger worker 超过 5 分钟未扫描"
          description: "AgentLedger outbox worker 最近一次心跳超过 5 分钟，需检查调度器是否停摆。"

      - alert: "TokenPulseAgentLedgerOpenBacklogStale"
        expr: |
          tokenpulse_agentledger_runtime_open_backlog_total > 0
            and
          tokenpulse_agentledger_runtime_oldest_open_backlog_age_seconds > 300
        for: "5m"
        labels:
          severity: "warning"
          service: "tokenpulse"
          category: "agentledger"
          escalation: "open-backlog-stale"
        annotations:
          summary: "TokenPulse AgentLedger 开放积压持续陈旧"
          description: "AgentLedger open backlog 持续超过 5 分钟未清空，需复核 worker、下游状态与 nextRetry。"

      - alert: "TokenPulseAgentLedgerReplayRequiredBacklog"
        expr: |
          tokenpulse_agentledger_runtime_outbox_backlog{delivery_state="replay_required"} > 0
        for: "5m"
        labels:
          severity: "warning"
          service: "tokenpulse"
          category: "agentledger"
          escalation: "manual-replay-required"
        annotations:
          summary: "TokenPulse AgentLedger 出现需要人工 replay 的积压"
          description: "AgentLedger outbox 中存在 replay_required 记录，需进入企业控制面执行人工补偿。"
