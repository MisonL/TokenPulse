global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: "tokenpulse"
    environment: "production"

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "tokenpulse"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "host.docker.internal:9009"
        labels:
          app: "tokenpulse"
          env: "production"
