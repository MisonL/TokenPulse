global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: "tokenpulse"
    environment: "production"

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "tokenpulse"
    metrics_path: "/metrics"
    # 生产默认 EXPOSE_METRICS=false，此时 /metrics 需要 Bearer API_SECRET。
    # 建议通过 bearer_token_file 注入，不要将真实密钥写入仓库。
    bearer_token_file: "/etc/prometheus/secrets/tokenpulse_api_secret"
    static_configs:
      - targets:
          - "host.docker.internal:9009"
        labels:
          app: "tokenpulse"
          env: "production"
